<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>StudentHub - Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #007BFF, #00C6FF);
        }

        .login-box {
            width: 400px;
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0px 10px 25px rgba(0, 0, 0, 0.3);
        }

        .login-box h1 {
            text-align: center;
            color: #0d47a1;
            margin-bottom: 10px;
        }

        .login-box p {
            text-align: center;
            color: gray;
            margin-bottom: 30px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
            color: #333;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #cccccc;
            border-radius: 8px;
            font-size: 15px;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: #007BFF;
            outline: none;
            box-shadow: 0 0 8px rgba(0, 123, 255, 0.4);
        }

        input[type="submit"] {
            width: 100%;
            padding: 13px;
            background: #007BFF;
            color: white;
            font-size: 17px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        input[type="submit"]:hover {
            background: #0056b3;
        }

        .register {
            text-align: center;
            margin-top: 25px;
        }

        .register a {
            color: #007BFF;
            text-decoration: none;
            font-weight: bold;
        }

        .register a:hover {
            text-decoration: underline;
        }

        .footer {
            margin-top: 25px;
            text-align: center;
            color: gray;
            font-size: 13px;
        }

        @media (max-width: 450px) {
            .login-box {
                width: 90%;
                padding: 30px;
            }
        }
    </style>

</head>

<body>

    <div class="login-box">

        <h1>StudentHub</h1>

        <p>Student Management System</p>

        <form action="main.html" method="post">

            <label for="username">Username</label>

            <input
                type="text"
                id="username"
                name="username"
                placeholder="Enter your username"
                required>

            <label for="password">Password</label>

            <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter your password"
                required>

            <input type="submit" value="Login">

        </form>

        <div class="register">
            Don't have an account?
            <a href="register.html">Register Here</a>
        </div>

        <div class="footer">
            © 2026 StudentHub Portal
        </div>

    </div>

</body>

</html>
